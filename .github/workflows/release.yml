name: Release Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      app_version:
        description: 'App version (must match expo.version in app.json)'
        required: false
        default: '1.1.0-beta.1'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    name: Build & release debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0
          ndk: false

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Generate Android project (expo prebuild)
        run: npx --yes expo prebuild --platform android --clean
        env:
          CI: "1"

      - name: Add missing splashscreen_background color
        run: |
          set -euo pipefail
          COLORS="android/app/src/main/res/values/colors.xml"
          if grep -q 'splashscreen_background' "$COLORS"; then
            echo "splashscreen_background already present"
            exit 0
          fi
          printf '%s\n' \
            "import re, sys" \
            "p = 'android/app/src/main/res/values/colors.xml'" \
            "c = open(p).read()" \
            "new_c = re.sub(r'(</resources>)', r'    <color name=\"splashscreen_background\">#FFFFFF</color>\\n\\1', c)" \
            "if new_c == c:" \
            "    print('WARNING: could not find </resources> tag to patch', file=sys.stderr)" \
            "    sys.exit(1)" \
            "open(p, 'w').write(new_c)" \
            "print('Added splashscreen_background to colors.xml')" \
            > /tmp/patch_colors.py
          python3 /tmp/patch_colors.py

      - name: Patch AndroidManifest.xml for cleartext (LAN dashboard URLs)
        run: |
          set -euo pipefail
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ ! -f "$MANIFEST" ]; then
            echo "::error::AndroidManifest.xml not found at $MANIFEST after prebuild"
            exit 1
          fi
          # Insert android:usesCleartextTraffic="true" into the <application ...> opening tag
          # if it isn't already present. Use python for a robust in-place edit.
          python3 - <<'PY'
          import re, sys, pathlib
          p = pathlib.Path("android/app/src/main/AndroidManifest.xml")
          src = p.read_text()
          if 'usesCleartextTraffic' in src:
              print("usesCleartextTraffic already set; leaving AndroidManifest.xml as-is")
              sys.exit(0)
          new_src, n = re.subn(
              r'(<application\b)([^>]*?)>',
              r'\1\2 android:usesCleartextTraffic="true">',
              src,
              count=1,
          )
          if n != 1:
              print("::error::failed to find <application> tag in AndroidManifest.xml", file=sys.stderr)
              sys.exit(1)
          p.write_text(new_src)
          print("Patched AndroidManifest.xml: added usesCleartextTraffic=\"true\"")
          PY

      - name: Sanity check generated android/ directory
        run: |
          set -euo pipefail
          if [ ! -f android/app/build.gradle ]; then
            echo "::error::android/app/build.gradle not found after expo prebuild. Did prebuild fail?"
            exit 1
          fi
          ls -la android/app/build.gradle
          echo "android/ generated OK"

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Locate APK
        id: locate_apk
        run: |
          set -euo pipefail
          APK=$(find android/app/build/outputs/apk/debug -maxdepth 2 -name "*.apk" | head -n 1)
          if [ -z "$APK" ]; then
            echo "::error::No APK produced under android/app/build/outputs/apk/debug"
            exit 1
          fi
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"
          ls -la "$APK"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: bizar-companion-${{ github.ref_name }}
          path: ${{ steps.locate_apk.outputs.apk_path }}
          retention-days: 90
          if-no-files-found: error

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Bizar Companion ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: ${{ steps.locate_apk.outputs.apk_path }}
          body: |
            ## Bizar Companion ${{ github.ref_name }}

            ### What's new

            Debug APK build of Bizar Companion ${{ github.ref_name }}. See the auto-generated notes below for the commit-by-commit diff since the last release.

            ### Auth model

            This build uses the dashboard's long-lived secret as a Bearer token. After install, open the app and pair by either:

            - **Scan QR**: dashboard → Settings → **Pair Device** → scan with the companion camera → paste the dashboard secret (Settings → API → **Reveal token**) on the next screen, OR
            - **Manual**: open the **Manual** tab, paste the dashboard URL, then paste the dashboard secret.

            The secret is stored in `expo-secure-store` on the device.

            ### Supported dashboard version

            **5.3.0 or later.** Older dashboards will reject the companion's REST + WebSocket calls.

            ### How to install

            1. Download `app-debug.apk` below to your Android device (USB transfer, browser download, or `adb install`).
            2. On the device: **Settings → Apps → Special access → Install unknown apps** → allow your file manager / browser.
            3. Open the APK from the file manager and tap **Install**.
            4. Launch **Bizar Companion** and complete pairing.

            ### Known limitations

            - Debug build — not signed for Play Store distribution. Manual install required.
            - Single project view in Tasks (server-side scoped by active project).
            - Chat agent defaults to `odin` (dashboard default); no agent picker yet.
            - Camera scanner is QR-only.
            - Cleartext HTTP allowed (`usesCleartextTraffic="true"` injected at build time) — required for LAN deployments.